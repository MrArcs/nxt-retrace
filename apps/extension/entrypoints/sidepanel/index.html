<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Retrace</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <header>
      <div class="brand">
        <img src="./icon/32.png" alt="" />
        <h1>Retrace</h1>
      </div>
      <span id="status" class="pill idle">idle</span>
    </header>

    <div class="controls">
      <button id="toggle" class="primary">Start recording</button>
      <button id="discard" class="ghost" hidden>Discard</button>
    </div>

    <ol id="steps" class="steps"></ol>
    <p id="empty" class="empty">
      Open the page you want to test, then hit <b>Start recording</b>. Every
      click and keystroke becomes a Playwright step.
    </p>

    <footer id="saveBar" hidden>
      <input id="name" type="text" placeholder="Script name" />
      <div class="row">
        <button id="copy" class="ghost">Copy code</button>
        <button id="save" class="primary">Save to library</button>
      </div>
      <p id="error" class="error" hidden></p>
    </footer>

    <script type="module" src="./main.ts"></script>
  </body>
</html>
